  <text x="166" y="332" fill="#aaa" font-size="12"> I built </text>
  <text x="220" y="332" fill="#ffbd2e" font-size="12">Orquestra Flow</text>
  <text x="334" y="332" fill="#aaa" font-size="12"> — an AI agent that</text>

  <text x="44" y="352" fill="#aaa" font-size="12">classifies operational email demands in</text>
  <text x="336" y="352" fill="#ff6eb4" font-size="12"> under 60 seconds,</text>
  <text x="472" y="352" fill="#aaa" font-size="12"> before they hit the SLA clock.</text>

