  <!-- whoami -->
  <text x="28" y="260" fill="#555" font-size="13">$</text>
  <text x="42" y="260" fill="#33ff33" font-size="13">whoami</text>

  <text x="44" y="282" fill="#aaa" font-size="12">Hey, I'm</text>
  <text x="116" y="282" fill="#33ff33" font-size="12" font-weight="bold">Pedro Cavalcanti.</text>
  <text x="44" y="300" fill="#aaa" font-size="12">I sit at the intersection of</text>
  <text x="244" y="300" fill="#ffbd2e" font-size="12">AI,</text>
  <text x="272" y="300" fill="#ffbd2e" font-size="12">Automation</text>
  <text x="360" y="300" fill="#aaa" font-size="12">and</text>
  <text x="390" y="300" fill="#ffbd2e" font-size="12">Data Analytics.</text>
  <text x="44" y="318" fill="#aaa" font-size="12">Building things that run in production, not just on localhost.</text>
  <text x="44" y="342" fill="#aaa" font-size="12">At</text>
  <text x="62" y="342" fill="#33ff33" font-size="12">Itaú Unibanco,</text>
  <text x="168" y="342" fill="#aaa" font-size="12">I built</text>
  <text x="218" y="342" fill="#ffbd2e" font-size="12">Orquestra Flow</text>
  <text x="336" y="342" fill="#aaa" font-size="12">— an AI agent that</text>
  <text x="44" y="360" fill="#aaa" font-size="12">classifies operational demands in</text>
  <text x="276" y="360" fill="#ff6eb4" font-size="12">under 60 seconds.</text>
  <text x="44" y="378" fill="#aaa" font-size="12">Before that? QA at a California startup. And before that — English teacher.</text>

