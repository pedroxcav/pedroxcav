  <text x="374" y="290" fill="#ffbd2e" font-size="12">Data Analytics</text>
  <text x="482" y="290" fill="#aaa" font-size="12">—</text>
  <text x="44" y="308" fill="#aaa" font-size="12">building things that actually run in production, not just on localhost.</text>

  <text x="44" y="330" fill="#aaa" font-size="12">At</text>
  <text x="62" y="330" fill="#33ff33" font-size="12">Itaú Unibanco,</text>
  <text x="166" y="330" fill="#aaa" font-size="12">I built</text>
  <text x="214" y="330" fill="#ffbd2e" font-size="12">Orquestra Flow</text>
  <text x="328" y="330" fill="#aaa" font-size="12">— an AI agent that classifies</text>
  <text x="44" y="348" fill="#aaa" font-size="12">operational email demands in</text>
  <text x="236" y="348" fill="#ff6eb4" font-size="12">under 60 seconds,</text>
  <text x="358" y="348" fill="#aaa" font-size="12">before they hit the SLA clock.</text>

  <text x="44" y="370" fill="#aaa" font-size="12">Before that? QA at a California-based startup — automated tests in plain</text>
  <text x="44" y="388" fill="#aaa" font-size="12">English. And before that — English teacher. Yes, really.</text>

  <text x="44" y="410" fill="#555" font-size="12">// The through-line: explaining complex things simply, bridging worlds.</text>

