  <text x="44" y="272" fill="#aaa" font-size="12">Hey, I'm</text>
  <text x="112" y="272" fill="#33ff33" font-size="12">Pedro Cavalcanti.</text>
  <text x="44" y="290" fill="#aaa" font-size="12">I sit at the intersection of</text>
  <text x="236" y="290" fill="#ffbd2e" font-size="12">AI,</text>
  <text x="260" y="290" fill="#ffbd2e" font-size="12">Automation</text>
